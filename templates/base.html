<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JBAC URL Shortener{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1a1a2e;
            color: #fff;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 0.05em;
        }

        header a {
            color: #e0e0ff;
            text-decoration: none;
        }

        header a:hover { text-decoration: underline; }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card h2 { margin-top: 0; font-size: 1.2rem; }

        .form-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .form-row input[type="url"],
        .form-row input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .form-row input:focus { outline: 2px solid #4f46e5; border-color: #4f46e5; }

        .btn {
            padding: 0.6rem 1.2rem;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .btn:hover { background: #4338ca; }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .alert-success {
            background: #d1fae5;
            border: 1px solid #6ee7b7;
            color: #065f46;
        }

        .alert-error {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid #e5e7eb; color: #6b7280; font-weight: 600; }
        td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .short-link { color: #4f46e5; font-weight: 600; text-decoration: none; }
        .short-link:hover { text-decoration: underline; }

        .original-url {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #6b7280;
            font-size: 0.85rem;
        }

        .badge {
            display: inline-block;
            background: #ede9fe;
            color: #5b21b6;
            border-radius: 12px;
            padding: 0.1rem 0.5rem;
            font-size: 0.8rem;
        }

        .empty { text-align: center; color: #9ca3af; padding: 2rem 0; }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: #9ca3af;
        }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="/l">JBAC</a></h1>
        <span style="color:#a5b4fc;">URL Shortener</span>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        &copy; JBAC &mdash; Simple Python URL Shortener
    </footer>
</body>
</html>
